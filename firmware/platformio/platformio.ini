; PlatformIO Project Configuration File
; Adaptive ESP32 Mesh Network
; Supports: ESP32-C3 (2.4 GHz), ESP32-C5 (5 GHz)

[platformio]
default_envs = esp32c3_devkitm_1

; ============================================================================
; Common Configuration
; ============================================================================

[env]
platform = espressif32
framework = esp-idf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
    ; ESP-IDF components are included automatically
    
; Build flags
build_flags =
    -DWIFI_CHANNEL_24GHZ=6    ; Default 2.4 GHz channel
    -DWIFI_CHANNEL_5GHZ=36    ; Default 5 GHz channel
    -DMESH_MAX_HOPS=10
    -DMESH_VOTE_PERCENT=1
    -DUDP_PORT=1234
    -DMAX_NEIGHBORS=8
    -DRSSI_THRESHOLD=3
    -DNEIGHBOR_TIMEOUT_MS=5000
    -DTARGET_RSSI=-65
    -DMIN_TX_POWER=0
    -DMAX_TX_POWER=20
    -DTX_POWER_STEP=2
    -DSTATE_UPDATE_INTERVAL=100
    -DTEMPERATURE_SCALE=10.0

; Debug flags (uncomment to enable)
; build_flags =
;     ${env.build_flags}
;     -DDEBUG_MESH=true
;     -DDEBUG_BEACON=true
;     -DDEBUG_UDP=true
;     -DDEBUG_NEIGHBORS=true
;     -DDEBUG_TX_POWER=true

; ============================================================================
; ESP32-C3 Configuration (2.4 GHz)
; ============================================================================

[env:esp32c3_devkitm_1]
board = esp32-c3-devkitm-1
board_build.partitions = default
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L

; ESP32-C3 specific configuration
build_flags =
    ${env.build_flags}
    -DESP_PLATFORM=ESP32_C3
    -DWIFI_CHANNEL=WIFI_CHANNEL_24GHZ  ; Use 2.4 GHz channel
    -DVISUALIZATION_IP="192.168.1.254"

; Enable WiFi for ESP32-C3
board_build.embed_files =
    ; No embedded files needed

; ============================================================================
; ESP32-C5 Configuration (5 GHz)
; ============================================================================

[env:esp32c5_devkitm_1]
board = esp32-c5-devkitm-1
board_build.partitions = default
board_build.mcu = esp32c5
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; ESP32-C5 specific configuration
build_flags =
    ${env.build_flags}
    -DESP_PLATFORM=ESP32_C5
    -DWIFI_CHANNEL=WIFI_CHANNEL_5GHZ  ; Use 5 GHz channel
    -DVISUALIZATION_IP="192.168.1.254"

; ============================================================================
; Generic ESP32 Configuration (2.4 GHz)
; ============================================================================

[env:esp32dev]
board = esp32dev
board_build.partitions = default
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L

; Generic ESP32 specific configuration
build_flags =
    ${env.build_flags}
    -DESP_PLATFORM=ESP32
    -DWIFI_CHANNEL=WIFI_CHANNEL_24GHZ  ; Use 2.4 GHz channel
    -DVISUALIZATION_IP="192.168.1.254"

; ============================================================================
; Debug Configuration
; ============================================================================

[env:debug_esp32c3]
extends = env:esp32c3_devkitm_1
debug_tool = esp-prog
build_type = debug

[env:debug_esp32c5]
extends = env:esp32c5_devkitm_1
debug_tool = esp-prog
build_type = debug

; ============================================================================
; Release Configuration
; ============================================================================

[env:release_esp32c3]
extends = env:esp32c3_devkitm_1
build_type = release
build_flags =
    ${env.build_flags}
    -DNDEBUG  ; Disable assertions in release

[env:release_esp32c5]
extends = env:esp32c5_devkitm_1
build_type = release
build_flags =
    ${env.build_flags}
    -DNDEBUG  ; Disable assertions in release
