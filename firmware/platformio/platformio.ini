; PlatformIO Project Configuration File
; Seeed Studio XIAO ESP32-C3 WiFi Mesh Network
; Real ESP-WiFi-Mesh using ESP-IDF framework

[platformio]
default_envs = seeed_xiao_esp32c3

; ============================================================================
; Common Configuration for Seeed XIAO ESP32-C3
; ============================================================================

[env]
platform = espressif32
framework = espidf
board = seeed_xiao_esp32c3
upload_port = /dev/ttyACM*
upload_protocol = esptool
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ESP-IDF specific configuration
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L

; Enable ESP-WiFi-Mesh and other components
; ESP-WiFi-Mesh is built into ESP-IDF v4.4+
lib_deps =
    pelicanhu/ESPCPUTemp@^0.2.0
    
; WiFi and Mesh Configuration
; These are defined in config.h, so we don't need to redefine them here
build_flags =
    ; Only define things not already in config.h
    -DUDP_PORT=1234
    -DVISUALIZATION_PORT=1234

; ============================================================================
; Release Configuration (optimized for production)
; ============================================================================

[env:seeed_xiao_esp32c3]
extends = env
build_type = release
build_flags =
    ${env.build_flags}
    -DNDEBUG